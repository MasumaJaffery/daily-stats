name: Daily GitHub Stats Commit

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Stats & Commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import os
          from datetime import datetime

          username = "MasumaJaffery"
          token = os.environ.get("GH_TOKEN", "")

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json"
          }

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          user = fetch(f"https://api.github.com/users/{username}")
          repos = fetch(f"https://api.github.com/users/{username}/repos?per_page=100&sort=updated")

          total_stars = sum(r["stargazers_count"] for r in repos)
          total_forks = sum(r["forks_count"] for r in repos)

          lang_counts = {}
          for r in repos:
              lang = r.get("language")
              if lang:
                  lang_counts[lang] = lang_counts.get(lang, 0) + 1
          top_langs = sorted(lang_counts.items(), key=lambda x: -x[1])[:5]
          top_repos = sorted(repos, key=lambda x: -x["stargazers_count"])[:5]

          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          lines = [
              "# 📊 GitHub Stats Snapshot",
              "",
              f"> Last updated: **{now}**",
              "",
              "## 👤 Profile",
              "| Field | Value |",
              "|-------|-------|",
              f"| Followers | {user['followers']} |",
              f"| Following | {user['following']} |",
              f"| Public Repos | {user['public_repos']} |",
              f"| Total Stars | {total_stars} ⭐ |",
              f"| Total Forks | {total_forks} 🍴 |",
              "",
              "## 🗣️ Top Languages",
              "| Language | Repos |",
              "|----------|-------|",
          ] + [f"| {lang} | {count} |" for lang, count in top_langs] + [
              "",
              "## 🏆 Top Repos by Stars",
              "| Repo | Stars | Forks |",
              "|------|-------|-------|",
          ] + [f"| [{r['name']}]({r['html_url']}) | {r['stargazers_count']} ⭐ | {r['forks_count']} 🍴 |" for r in top_repos]

          with open("github-stats.md", "w") as f:
              f.write("\n".join(lines) + "\n")

          print("✅ Stats written!")
          EOF

      - name: Commit stats
        run: |
          git config user.name "MasumaJaffery"
          git config user.email "masumajaffery1@gmail.com"
          git add github-stats.md
          git commit -m "chore: update github stats $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push
